<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="56%">
      <stop offset="0%" stop-color="#271B12"/>
      <stop offset="55%" stop-color="#131210"/>
      <stop offset="100%" stop-color="#080706"/>
    </radialGradient>

    <radialGradient id="glow" cx="50%" cy="55%" r="48%">
      <stop offset="0%" stop-color="#B8843D" stop-opacity="0.26"/>
      <stop offset="70%" stop-color="#B8843D" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#B8843D" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="btmFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#090909" stop-opacity="0"/>
      <stop offset="100%" stop-color="#090909" stop-opacity="0.7"/>
    </linearGradient>

    <linearGradient id="topHaze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8843D" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#B8843D" stop-opacity="0"/>
    </linearGradient>

    <!-- Pole stripe clip -->
    <clipPath id="poleClip">
      <rect x="310" y="90" width="16" height="90"/>
    </clipPath>

    <filter id="blur16" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="blur4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <style>
      @keyframes breathe {
        0%, 100% { opacity: 0.55; }
        50%       { opacity: 1; }
      }
      @keyframes floatScissors {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-10px); }
      }
      @keyframes floatComb {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-7px); }
      }
      @keyframes openBlade {
        0%, 100% { transform: rotate(0deg); }
        50%       { transform: rotate(13deg); }
      }
      @keyframes closeBlade {
        0%, 100% { transform: rotate(0deg); }
        50%       { transform: rotate(-13deg); }
      }
      /* Barber pole: stripes scroll upward (-56px = one seamless cycle) */
      @keyframes scrollPole {
        from { transform: translateY(0); }
        to   { transform: translateY(-56px); }
      }
      @keyframes riseA {
        0%   { opacity: 0;   transform: translateY(0); }
        20%  { opacity: 0.9; }
        80%  { opacity: 0.5; }
        100% { opacity: 0;   transform: translateY(-85px); }
      }
      @keyframes riseB {
        0%   { opacity: 0;   transform: translateY(0); }
        25%  { opacity: 0.75; }
        75%  { opacity: 0.4; }
        100% { opacity: 0;   transform: translateY(-100px); }
      }

      .glow-el      { animation: breathe 5s ease-in-out infinite; }
      .scissors-grp { animation: floatScissors 3.4s ease-in-out infinite; }
      .blade1       { animation: openBlade  2.3s ease-in-out infinite; transform-origin: 0px 0px; }
      .blade2       { animation: closeBlade 2.3s ease-in-out infinite; transform-origin: 0px 0px; }
      .comb-grp     { animation: floatComb 4.1s ease-in-out infinite 0.6s; }
      .pole-fill    { animation: scrollPole 1.3s linear infinite; }
      .d1 { animation: riseA 2.9s ease-out infinite; }
      .d2 { animation: riseB 3.4s ease-out infinite 0.8s; }
      .d3 { animation: riseA 3.1s ease-out infinite 1.6s; }
      .d4 { animation: riseB 2.7s ease-out infinite 2.3s; }
      .d5 { animation: riseA 3.7s ease-out infinite 0.3s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Central brass glow -->
  <ellipse class="glow-el" cx="200" cy="245" rx="155" ry="125" fill="url(#glow)" filter="url(#blur16)"/>

  <!-- ══ BARBER CHAIR ══ -->
  <!-- Base disc shadow -->
  <ellipse cx="200" cy="332" rx="52" ry="7" fill="#B8843D" opacity="0.28" filter="url(#blur4)"/>
  <!-- Hydraulic column -->
  <rect x="195" y="262" width="10" height="70" rx="3" fill="#7A5820" opacity="0.6"/>
  <!-- Seat -->
  <rect x="155" y="249" width="90" height="14" rx="5" fill="#0C0A08"/>
  <rect x="158" y="241" width="84" height="12" rx="4" fill="#161310"/>
  <!-- Back rest -->
  <rect x="164" y="152" width="72" height="96" rx="6" fill="#0C0A08"/>
  <rect x="168" y="156" width="64" height="90" rx="5" fill="#151210"/>
  <!-- Head rest -->
  <rect x="176" y="142" width="48" height="18" rx="5" fill="#0C0A08"/>
  <!-- Armrests -->
  <rect x="152" y="249" width="13" height="48" rx="3" fill="#0C0A08"/>
  <rect x="235" y="249" width="13" height="48" rx="3" fill="#0C0A08"/>
  <!-- Armrest pads -->
  <rect x="150" y="290" width="17" height="5" rx="2" fill="#1A1410"/>
  <rect x="233" y="290" width="17" height="5" rx="2" fill="#1A1410"/>
  <!-- Footrest -->
  <rect x="170" y="304" width="60" height="7" rx="2" fill="#B8843D" opacity="0.42"/>
  <!-- Brass ring ornaments -->
  <circle cx="183" cy="190" r="6" fill="none" stroke="#B8843D" stroke-width="1.2" opacity="0.38"/>
  <circle cx="217" cy="190" r="6" fill="none" stroke="#B8843D" stroke-width="1.2" opacity="0.38"/>
  <line x1="189" y1="190" x2="211" y2="190" stroke="#B8843D" stroke-width="0.8" opacity="0.18"/>
  <!-- Seat highlight -->
  <rect x="168" y="156" width="64" height="3" rx="1.5" fill="#EFD9B1" opacity="0.03"/>

  <!-- ══ BARBER POLE ══ -->
  <!-- Halo glow -->
  <rect x="304" y="84" width="32" height="102" rx="6" fill="#B8843D" opacity="0.04" filter="url(#blur16)"/>
  <!-- Ivory pole body -->
  <rect x="310" y="90" width="16" height="90" rx="3" fill="#EAE2D6" opacity="0.11"/>
  <!-- Animated stripes — 6 bands, seamless 56 px cycle -->
  <g clip-path="url(#poleClip)">
    <g class="pole-fill">
      <rect x="310" y="90"  width="16" height="28" fill="#B8843D" opacity="0.72"/>
      <rect x="310" y="118" width="16" height="28" fill="#EAE2D6" opacity="0.28"/>
      <rect x="310" y="146" width="16" height="28" fill="#B8843D" opacity="0.72"/>
      <rect x="310" y="174" width="16" height="28" fill="#EAE2D6" opacity="0.28"/>
      <rect x="310" y="202" width="16" height="28" fill="#B8843D" opacity="0.72"/>
      <rect x="310" y="230" width="16" height="28" fill="#EAE2D6" opacity="0.28"/>
    </g>
  </g>
  <!-- Pole caps -->
  <ellipse cx="318" cy="90"  rx="8.5" ry="3.5" fill="#B8843D" opacity="0.52"/>
  <ellipse cx="318" cy="180" rx="8.5" ry="3.5" fill="#B8843D" opacity="0.52"/>

  <!-- ══ SCISSORS ══ -->
  <g class="scissors-grp" transform="translate(105, 198)">
    <g transform="rotate(-32)">
      <!-- Blade 1 -->
      <g class="blade1">
        <rect x="-3.5" y="-50" width="7" height="68" rx="2.5" fill="#C8A870" opacity="0.78"/>
        <circle cx="0" cy="22" r="10.5" fill="none" stroke="#C8A870" stroke-width="2.5" opacity="0.78"/>
        <circle cx="0" cy="22" r="5" fill="#C8A870" opacity="0.42"/>
      </g>
      <!-- Blade 2 (starts 22° open from blade 1) -->
      <g class="blade2">
        <rect x="-3.5" y="-50" width="7" height="68" rx="2.5" fill="#C8A870" opacity="0.78" transform="rotate(22)"/>
        <circle cx="11" cy="24" r="10.5" fill="none" stroke="#C8A870" stroke-width="2.5" opacity="0.78" transform="rotate(22)"/>
      </g>
      <!-- Pivot screw -->
      <circle cx="0" cy="0" r="4"   fill="#EFD9B1" opacity="0.84"/>
      <circle cx="0" cy="0" r="1.5" fill="#0C0A08" opacity="0.5"/>
    </g>
  </g>

  <!-- ══ COMB ══ -->
  <g class="comb-grp" transform="translate(296, 274) rotate(18)">
    <rect x="-36" y="-5" width="72" height="9" rx="3" fill="#C8A870" opacity="0.38"/>
    <rect x="-30" y="4"  width="7" height="15" rx="2" fill="#C8A870" opacity="0.32"/>
    <rect x="-19" y="4"  width="7" height="15" rx="2" fill="#C8A870" opacity="0.32"/>
    <rect x="-8"  y="4"  width="7" height="15" rx="2" fill="#C8A870" opacity="0.32"/>
    <rect x="3"   y="4"  width="7" height="15" rx="2" fill="#C8A870" opacity="0.32"/>
    <rect x="14"  y="4"  width="7" height="15" rx="2" fill="#C8A870" opacity="0.32"/>
    <rect x="25"  y="4"  width="7" height="15" rx="2" fill="#C8A870" opacity="0.32"/>
  </g>

  <!-- ══ GOLD DUST PARTICLES ══ -->
  <circle class="d1" cx="148" cy="348" r="2"   fill="#EFD9B1"/>
  <circle class="d2" cx="200" cy="362" r="1.5" fill="#B8843D"/>
  <circle class="d3" cx="252" cy="354" r="2.5" fill="#EFD9B1"/>
  <circle class="d4" cx="176" cy="358" r="1.5" fill="#C8A870"/>
  <circle class="d5" cx="224" cy="366" r="2"   fill="#EFD9B1"/>

  <!-- Static ambient sparkles -->
  <circle cx="74"  cy="115" r="1.5" fill="#EFD9B1" opacity="0.12"/>
  <circle cx="346" cy="162" r="1"   fill="#B8843D"  opacity="0.16"/>
  <circle cx="52"  cy="288" r="2"   fill="#EFD9B1"  opacity="0.09"/>
  <circle cx="358" cy="312" r="1.5" fill="#C8A870"  opacity="0.13"/>
  <circle cx="118" cy="52"  r="1"   fill="#EFD9B1"  opacity="0.15"/>
  <circle cx="332" cy="74"  r="1.5" fill="#B8843D"  opacity="0.1"/>
  <circle cx="372" cy="238" r="1"   fill="#EFD9B1"  opacity="0.1"/>
  <circle cx="28"  cy="195" r="1.5" fill="#B8843D"  opacity="0.08"/>

  <!-- ══ ATMOSPHERIC OVERLAYS ══ -->
  <rect width="400" height="115" fill="url(#topHaze)"/>
  <rect y="268" width="400" height="132" fill="url(#btmFade)"/>
</svg>
