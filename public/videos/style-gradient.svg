<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
@keyframes clipUp{0%,100%{transform:translateY(0px)}45%,55%{transform:translateY(-110px)}}
@keyframes fadeShift{0%,100%{opacity:.85}50%{opacity:.22}}
@keyframes shimBlade{0%,100%{opacity:.18}50%{opacity:.72}}
@keyframes glowPulse{0%,100%{opacity:.1}50%{opacity:.48}}
@keyframes rA{0%{opacity:0;transform:translate(0,0)}20%{opacity:.9}100%{opacity:0;transform:translate(-10px,-40px)}}
@keyframes rB{0%{opacity:0;transform:translate(0,0)}20%{opacity:.7}100%{opacity:0;transform:translate(8px,-34px)}}
@keyframes rC{0%{opacity:0;transform:translate(0,0)}20%{opacity:.85}100%{opacity:0;transform:translate(-5px,-48px)}}
.clipper-grp{animation:clipUp 3.2s ease-in-out infinite}
.fade-overlay{animation:fadeShift 3.2s ease-in-out infinite}
.blade-shim{animation:shimBlade 1.3s linear infinite}
.glow-el{animation:glowPulse 3.2s ease-in-out infinite}
.d1{animation:rA 3.2s .4s ease-out infinite}
.d2{animation:rB 3.2s 1.1s ease-out infinite}
.d3{animation:rC 3.2s 1.8s ease-out infinite}
</style>
<radialGradient id="bgG" cx="40%" cy="30%" r="65%">
  <stop offset="0%" stop-color="#B8843D" stop-opacity="0.12"/>
  <stop offset="100%" stop-color="#090909" stop-opacity="0"/>
</radialGradient>
<!-- Fade gradient from dark hair top → skin bottom -->
<linearGradient id="fadeG" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%"  stop-color="#2A1C0E"/>
  <stop offset="45%" stop-color="#1A1208" stop-opacity="0.7"/>
  <stop offset="75%" stop-color="#0D0B09" stop-opacity="0.25"/>
  <stop offset="100%" stop-color="#0D0B09" stop-opacity="0"/>
</linearGradient>
<linearGradient id="hairTop" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#2A1C0E"/>
  <stop offset="100%" stop-color="#1A1208" stop-opacity="0.4"/>
</linearGradient>
<linearGradient id="clipG" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#C8A850"/>
  <stop offset="100%" stop-color="#A07830"/>
</linearGradient>
<clipPath id="headClip">
  <ellipse cx="158" cy="158" rx="78" ry="92"/>
</clipPath>
</defs>

<rect width="300" height="400" fill="#090909"/>
<rect width="300" height="400" fill="url(#bgG)"/>

<!-- Neck -->
<rect x="136" y="242" width="44" height="70" rx="11" fill="#1A1410"/>
<!-- Shoulders -->
<ellipse cx="158" cy="336" rx="108" ry="52" fill="#151210"/>

<!-- Head base -->
<ellipse cx="158" cy="158" rx="78" ry="92" fill="#1E1610"/>

<!-- Hair top -->
<path d="M80,122 Q83,62 158,58 Q233,62 236,122 Q210,86 158,83 Q106,86 80,122Z" fill="url(#hairTop)"/>

<!-- Ear -->
<ellipse cx="81" cy="165" rx="9" ry="13" fill="#1A1410"/>

<!-- Fade gradient overlay on LEFT side of head -->
<ellipse class="fade-overlay" cx="116" cy="178" rx="52" ry="76" fill="url(#fadeG)"/>

<!-- Clipper group animates upward along the fade -->
<g class="clipper-grp">
  <rect x="36" y="252" width="56" height="23" rx="5" fill="url(#clipG)"/>
  <rect x="32" y="248" width="60" height="8" rx="3" fill="#EFD9B1"/>
  <g stroke="#B8843D" stroke-width="1.1" stroke-linecap="round">
    <line x1="34" y1="248" x2="34" y2="242"/><line x1="37.5" y1="248" x2="37.5" y2="242"/>
    <line x1="41" y1="248" x2="41" y2="242"/><line x1="44.5" y1="248" x2="44.5" y2="242"/>
    <line x1="48" y1="248" x2="48" y2="242"/><line x1="51.5" y1="248" x2="51.5" y2="242"/>
    <line x1="55" y1="248" x2="55" y2="242"/><line x1="58.5" y1="248" x2="58.5" y2="242"/>
    <line x1="62" y1="248" x2="62" y2="242"/><line x1="65.5" y1="248" x2="65.5" y2="242"/>
    <line x1="69" y1="248" x2="69" y2="242"/><line x1="72.5" y1="248" x2="72.5" y2="242"/>
    <line x1="76" y1="248" x2="76" y2="242"/><line x1="79.5" y1="248" x2="79.5" y2="242"/>
    <line x1="83" y1="248" x2="83" y2="242"/>
  </g>
  <rect class="blade-shim" x="32" y="245" width="60" height="3" rx="1" fill="white" opacity="0.42"/>
  <path d="M92,261 Q115,278 112,298 Q109,318 126,328" stroke="#B8843D" stroke-width="1.8" fill="none" stroke-dasharray="4,3" opacity="0.38"/>
  <ellipse class="glow-el" cx="64" cy="245" rx="24" ry="7" fill="#B8843D" opacity="0.25"/>
  <!-- Hair dust moves with clipper -->
  <circle class="d1" cx="56" cy="243" r="2" fill="#B8843D" opacity="0"/>
  <circle class="d2" cx="70" cy="241" r="1.5" fill="#EFD9B1" opacity="0"/>
  <circle class="d3" cx="46" cy="245" r="1.8" fill="#C8A850" opacity="0"/>
</g>

<line x1="65" y1="376" x2="235" y2="376" stroke="#B8843D" stroke-width="0.5" opacity="0.28"/>
<text x="150" y="392" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#B8843D" letter-spacing="5" opacity="0.45">DÉGRADÉ</text>
</svg>
