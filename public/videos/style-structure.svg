<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
/* Razor outliner traces the geometric hairline — moves along a path */
@keyframes razorMove{
  0%{transform:translate(0,0)}
  30%{transform:translate(80px,0)}
  55%{transform:translate(80px,60px)}
  80%{transform:translate(0,60px)}
  100%{transform:translate(0,0)}
}
@keyframes lineReveal1{0%,5%{stroke-dashoffset:90}35%,100%{stroke-dashoffset:0}}
@keyframes lineReveal2{0%,28%{stroke-dashoffset:70}58%,100%{stroke-dashoffset:0}}
@keyframes lineReveal3{0%,52%{stroke-dashoffset:90}82%,100%{stroke-dashoffset:0}}
@keyframes lineReveal4{0%,75%{stroke-dashoffset:70}100%{stroke-dashoffset:0}}
@keyframes glowPulse{0%,100%{opacity:.2}50%{opacity:.65}}
@keyframes bladePulse{0%,100%{opacity:.3}50%{opacity:.85}}
@keyframes rA{0%{opacity:0;transform:translate(0,0)}20%{opacity:.9}100%{opacity:0;transform:translate(-8px,-38px)}}
@keyframes rB{0%{opacity:0;transform:translate(0,0)}20%{opacity:.7}100%{opacity:0;transform:translate(7px,-32px)}}
.razor-grp{animation:razorMove 4s ease-in-out infinite}
.l1{animation:lineReveal1 4s ease-out infinite;stroke-dasharray:90;stroke-dashoffset:90}
.l2{animation:lineReveal2 4s ease-out infinite;stroke-dasharray:70;stroke-dashoffset:70}
.l3{animation:lineReveal3 4s ease-out infinite;stroke-dasharray:90;stroke-dashoffset:90}
.l4{animation:lineReveal4 4s ease-out infinite;stroke-dasharray:70;stroke-dashoffset:70}
.glow-el{animation:glowPulse 4s ease-in-out infinite}
.blade-g{animation:bladePulse 2s ease-in-out infinite}
.d1{animation:rA 4s .8s ease-out infinite}
.d2{animation:rB 4s 2.4s ease-out infinite}
</style>
<radialGradient id="bgG" cx="50%" cy="35%" r="65%">
  <stop offset="0%" stop-color="#B8843D" stop-opacity="0.12"/>
  <stop offset="100%" stop-color="#090909" stop-opacity="0"/>
</radialGradient>
<linearGradient id="razorG" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#EFD9B1"/>
  <stop offset="100%" stop-color="#C8A850"/>
</linearGradient>
</defs>

<rect width="300" height="400" fill="#090909"/>
<rect width="300" height="400" fill="url(#bgG)"/>

<!-- Head silhouette (front view, simplified) -->
<ellipse cx="150" cy="160" rx="80" ry="92" fill="#1E1610"/>
<!-- Hair top block — structured flat-top style -->
<rect x="76" y="68" width="148" height="58" rx="4" fill="#2A1C0E"/>
<!-- Sharp top edge of hair -->
<rect x="76" y="68" width="148" height="4" rx="2" fill="#B8843D" opacity="0.5"/>
<!-- Side fade areas -->
<rect x="76" y="68" width="16" height="58" fill="#1A1208" opacity="0.6"/>
<rect x="208" y="68" width="16" height="58" fill="#1A1208" opacity="0.6"/>
<!-- Ear -->
<ellipse cx="72" cy="168" rx="9" ry="13" fill="#1A1410"/>
<ellipse cx="228" cy="168" rx="9" ry="13" fill="#1A1410"/>
<!-- Face features -->
<ellipse cx="134" cy="160" rx="7" ry="5" fill="#0D0B09" opacity="0.22"/>
<ellipse cx="166" cy="160" rx="7" ry="5" fill="#0D0B09" opacity="0.22"/>

<!-- Geometric hairline lines (revealed as razor passes) -->
<!-- Top horizontal line -->
<line class="l1" x1="84" y1="126" x2="174" y2="126" stroke="#B8843D" stroke-width="1.5" opacity="0.7"/>
<!-- Left vertical line -->
<line class="l2" x1="84" y1="126" x2="84" y2="186" stroke="#B8843D" stroke-width="1.5" opacity="0.7"/>
<!-- Bottom horizontal line -->
<line class="l3" x1="84" y1="186" x2="174" y2="186" stroke="#B8843D" stroke-width="1.5" opacity="0.7"/>
<!-- Right vertical line -->
<line class="l4" x1="174" y1="126" x2="174" y2="186" stroke="#B8843D" stroke-width="1.5" opacity="0.7"/>

<!-- Glow at intersection points -->
<circle class="glow-el" cx="84" cy="126" r="4" fill="#B8843D" opacity="0.4"/>
<circle class="glow-el" cx="174" cy="186" r="4" fill="#B8843D" opacity="0.4"/>

<!-- Razor outliner — moves along the hairline path -->
<g class="razor-grp" style="transform-origin:84px 126px">
  <!-- Razor body (small precision outliner) -->
  <rect x="76" y="118" width="28" height="14" rx="3" fill="url(#razorG)"/>
  <!-- Blade tip -->
  <rect x="72" y="124" width="6" height="2" rx="1" fill="#EFD9B1"/>
  <!-- Glow at blade tip -->
  <ellipse class="blade-g" cx="72" cy="125" rx="5" ry="3" fill="#B8843D" opacity="0.5"/>
  <!-- Hair dust at razor tip -->
  <circle class="d1" cx="72" cy="124" r="1.8" fill="#B8843D" opacity="0"/>
  <circle class="d2" cx="68" cy="126" r="1.5" fill="#EFD9B1" opacity="0"/>
</g>

<line x1="65" y1="376" x2="235" y2="376" stroke="#B8843D" stroke-width="0.5" opacity="0.28"/>
<text x="150" y="392" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#B8843D" letter-spacing="5" opacity="0.45">STRUCTURÉ</text>
</svg>
