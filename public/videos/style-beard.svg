<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
/* Trimmer moves along the left cheekline then right */
@keyframes trimmerLeft{
  0%,100%{transform:translateY(0px)}
  42%,58%{transform:translateY(-90px)}
}
@keyframes edgeReveal{0%,100%{opacity:.35}50%{opacity:.85}}
@keyframes shimBlade{0%,100%{opacity:.18}50%{opacity:.72}}
@keyframes glowPulse{0%,100%{opacity:.12}50%{opacity:.5}}
@keyframes breathe{0%,100%{opacity:.55}50%{opacity:.9}}
@keyframes rA{0%{opacity:0;transform:translate(0,0)}20%{opacity:.9}100%{opacity:0;transform:translate(-10px,-38px)}}
@keyframes rB{0%{opacity:0;transform:translate(0,0)}20%{opacity:.7}100%{opacity:0;transform:translate(8px,-32px)}}
@keyframes rC{0%{opacity:0;transform:translate(0,0)}20%{opacity:.85}100%{opacity:0;transform:translate(-4px,-44px)}}
.trimmer-grp{animation:trimmerLeft 3.2s ease-in-out infinite}
.edge{animation:edgeReveal 3.2s ease-in-out infinite}
.blade-shim{animation:shimBlade 1.3s linear infinite}
.glow-el{animation:glowPulse 3.2s ease-in-out infinite}
.beard-fill{animation:breathe 4s ease-in-out infinite}
.d1{animation:rA 3.2s .4s ease-out infinite}
.d2{animation:rB 3.2s 1.0s ease-out infinite}
.d3{animation:rC 3.2s 1.6s ease-out infinite}
</style>
<radialGradient id="bgG" cx="50%" cy="40%" r="60%">
  <stop offset="0%" stop-color="#B8843D" stop-opacity="0.13"/>
  <stop offset="100%" stop-color="#090909" stop-opacity="0"/>
</radialGradient>
<linearGradient id="beardG" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#2A1C0E"/>
  <stop offset="100%" stop-color="#1A1208"/>
</linearGradient>
<linearGradient id="trimG" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#C8A850"/>
  <stop offset="100%" stop-color="#A07830"/>
</linearGradient>
<linearGradient id="skinG" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#1E1610"/>
  <stop offset="100%" stop-color="#151210"/>
</linearGradient>
</defs>

<rect width="300" height="400" fill="#090909"/>
<rect width="300" height="400" fill="url(#bgG)"/>

<!-- FACE (lower portion — chin area focus) -->
<!-- Neck -->
<rect x="124" y="290" width="52" height="90" rx="14" fill="#1A1410"/>
<!-- Jaw/chin base -->
<ellipse cx="150" cy="278" rx="88" ry="55" fill="url(#skinG)"/>
<!-- Upper face (forehead area, fading out at top) -->
<ellipse cx="150" cy="120" rx="85" ry="95" fill="#1E1610"/>
<!-- Ear elements -->
<ellipse cx="68" cy="168" rx="9" ry="14" fill="#1A1410"/>
<ellipse cx="232" cy="168" rx="9" ry="14" fill="#1A1410"/>
<!-- Eyes (very subtle) -->
<ellipse cx="128" cy="148" rx="9" ry="6" fill="#0D0B09" opacity="0.25"/>
<ellipse cx="172" cy="148" rx="9" ry="6" fill="#0D0B09" opacity="0.25"/>
<!-- Nose hint -->
<path d="M143,175 Q150,185 157,175" stroke="#0D0B09" stroke-width="1.5" fill="none" opacity="0.18"/>

<!-- BEARD — covers lower face area -->
<!-- Mustache -->
<ellipse class="beard-fill" cx="150" cy="198" rx="35" ry="8" fill="url(#beardG)" opacity="0.85"/>
<!-- Main beard shape -->
<path class="beard-fill" d="M 68,210 Q 62,235 70,260 Q 85,292 150,300 Q 215,292 230,260 Q 238,235 232,210 Q 210,225 150,228 Q 90,225 68,210Z" fill="url(#beardG)"/>

<!-- Sharp defined beard edge lines (the "neat" outline) -->
<path class="edge" d="M 68,210 Q 90,225 150,228 Q 210,225 232,210" stroke="#B8843D" stroke-width="1.5" fill="none" opacity="0.7"/>
<path class="edge" d="M 70,260 Q 85,292 150,300 Q 215,292 230,260" stroke="#B8843D" stroke-width="1" fill="none" opacity="0.5"/>

<!-- TRIMMER — runs along the left cheekline -->
<g class="trimmer-grp">
  <!-- Trimmer body (small, compact, held vertically against face) -->
  <rect x="38" y="242" width="22" height="52" rx="5" fill="url(#trimG)"/>
  <!-- Blade at top of trimmer -->
  <rect x="35" y="236" width="28" height="8" rx="3" fill="#EFD9B1"/>
  <!-- Teeth -->
  <g stroke="#B8843D" stroke-width="1" stroke-linecap="round">
    <line x1="37" y1="236" x2="37" y2="230"/>
    <line x1="40" y1="236" x2="40" y2="230"/>
    <line x1="43" y1="236" x2="43" y2="230"/>
    <line x1="46" y1="236" x2="46" y2="230"/>
    <line x1="49" y1="236" x2="49" y2="230"/>
    <line x1="52" y1="236" x2="52" y2="230"/>
    <line x1="55" y1="236" x2="55" y2="230"/>
    <line x1="58" y1="236" x2="58" y2="230"/>
    <line x1="61" y1="236" x2="61" y2="230"/>
  </g>
  <rect class="blade-shim" x="35" y="233" width="28" height="3" rx="1" fill="white" opacity="0.4"/>
  <!-- Glow at blade -->
  <ellipse class="glow-el" cx="49" cy="232" rx="16" ry="5" fill="#B8843D" opacity="0.25"/>
  <!-- Cord -->
  <path d="M60,270 Q75,285 72,305" stroke="#B8843D" stroke-width="1.5" fill="none" stroke-dasharray="3,3" opacity="0.35"/>
  <!-- Dust particles (move with trimmer) -->
  <circle class="d1" cx="49" cy="230" r="2" fill="#B8843D" opacity="0"/>
  <circle class="d2" cx="58" cy="228" r="1.5" fill="#EFD9B1" opacity="0"/>
  <circle class="d3" cx="40" cy="231" r="1.5" fill="#C8A850" opacity="0"/>
</g>

<line x1="65" y1="376" x2="235" y2="376" stroke="#B8843D" stroke-width="0.5" opacity="0.28"/>
<text x="150" y="392" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#B8843D" letter-spacing="5" opacity="0.45">BARBE SOIGNÉE</text>
</svg>
