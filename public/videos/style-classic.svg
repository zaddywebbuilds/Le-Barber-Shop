<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
@keyframes b1c{0%,100%{transform:rotate(-22deg)}50%{transform:rotate(-3deg)}}
@keyframes b2c{0%,100%{transform:rotate(10deg)}50%{transform:rotate(-9deg)}}
@keyframes scBob{0%,100%{transform:translateY(0px)}50%{transform:translateY(-8px)}}
@keyframes combBob{0%,100%{transform:translateY(0px)}50%{transform:translateY(-5px)}}
@keyframes glowPulse{0%,100%{opacity:.18}50%{opacity:.6}}
@keyframes rA{0%{opacity:0;transform:translate(0,0)}20%{opacity:.9}100%{opacity:0;transform:translate(-11px,-42px)}}
@keyframes rB{0%{opacity:0;transform:translate(0,0)}20%{opacity:.7}100%{opacity:0;transform:translate(9px,-36px)}}
@keyframes rC{0%{opacity:0;transform:translate(0,0)}20%{opacity:.85}100%{opacity:0;transform:translate(4px,-50px)}}
.b1{animation:b1c 2.4s ease-in-out infinite;transform-origin:108px 205px}
.b2{animation:b2c 2.4s ease-in-out infinite;transform-origin:108px 205px}
.sc-grp{animation:scBob 3.5s ease-in-out infinite}
.comb{animation:combBob 3.5s .7s ease-in-out infinite}
.glow-el{animation:glowPulse 4s ease-in-out infinite}
.d1{animation:rA 2.4s .5s ease-out infinite}
.d2{animation:rB 2.4s 1.1s ease-out infinite}
.d3{animation:rC 2.4s 1.7s ease-out infinite}
</style>
<radialGradient id="bgG" cx="42%" cy="33%" r="62%">
  <stop offset="0%" stop-color="#B8843D" stop-opacity="0.14"/>
  <stop offset="100%" stop-color="#090909" stop-opacity="0"/>
</radialGradient>
<linearGradient id="blG" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#EFD9B1"/>
  <stop offset="100%" stop-color="#C8A850"/>
</linearGradient>
</defs>

<rect width="300" height="400" fill="#090909"/>
<rect width="300" height="400" fill="url(#bgG)"/>

<!-- SCISSORS — left side, pivot at (108,205) -->
<g class="sc-grp">
  <ellipse class="glow-el" cx="108" cy="218" rx="50" ry="40" fill="none" stroke="#B8843D" stroke-width="0.5"/>
  <!-- Blade 1: upper-left -->
  <g class="b1">
    <path d="M108,205 L44,108 Q42,104 46,101 Q50,99 52,103 L108,205" fill="url(#blG)" opacity="0.9"/>
    <line x1="108" y1="205" x2="78" y2="265" stroke="#B8843D" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="66" cy="280" rx="16" ry="11" fill="none" stroke="#B8843D" stroke-width="2.5" transform="rotate(-38,66,280)"/>
  </g>
  <!-- Blade 2: upper-right -->
  <g class="b2">
    <path d="M108,205 L172,108 Q174,104 170,101 Q166,99 164,103 L108,205" fill="url(#blG)" opacity="0.9"/>
    <line x1="108" y1="205" x2="138" y2="265" stroke="#B8843D" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="150" cy="280" rx="16" ry="11" fill="none" stroke="#B8843D" stroke-width="2.5" transform="rotate(38,150,280)"/>
  </g>
  <circle cx="108" cy="205" r="7" fill="#EFD9B1"/>
  <circle cx="108" cy="205" r="3.5" fill="#B8843D"/>
</g>

<!-- Gold dust near scissor tips -->
<circle class="d1" cx="50" cy="105" r="2.5" fill="#B8843D" opacity="0"/>
<circle class="d2" cx="168" cy="104" r="2" fill="#EFD9B1" opacity="0"/>
<circle class="d3" cx="108" cy="165" r="1.8" fill="#C8A850" opacity="0"/>

<!-- COMB — right side, vertical, teeth pointing left -->
<g class="comb">
  <!-- Spine -->
  <rect x="216" y="128" width="10" height="144" rx="3" fill="#B8843D" opacity="0.8"/>
  <!-- Wide teeth (upper section) -->
  <g stroke="#EFD9B1" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
    <line x1="204" y1="140" x2="216" y2="140"/>
    <line x1="204" y1="150" x2="216" y2="150"/>
    <line x1="204" y1="160" x2="216" y2="160"/>
    <line x1="204" y1="170" x2="216" y2="170"/>
    <line x1="204" y1="180" x2="216" y2="180"/>
    <line x1="204" y1="190" x2="216" y2="190"/>
    <line x1="204" y1="200" x2="216" y2="200"/>
  </g>
  <!-- Fine teeth (lower section) -->
  <g stroke="#EFD9B1" stroke-width="1.5" stroke-linecap="round" opacity="0.55">
    <line x1="209" y1="212" x2="216" y2="212"/>
    <line x1="209" y1="218" x2="216" y2="218"/>
    <line x1="209" y1="224" x2="216" y2="224"/>
    <line x1="209" y1="230" x2="216" y2="230"/>
    <line x1="209" y1="236" x2="216" y2="236"/>
    <line x1="209" y1="242" x2="216" y2="242"/>
    <line x1="209" y1="248" x2="216" y2="248"/>
    <line x1="209" y1="254" x2="216" y2="254"/>
    <line x1="209" y1="260" x2="216" y2="260"/>
  </g>
</g>

<!-- Bottom label -->
<line x1="65" y1="376" x2="235" y2="376" stroke="#B8843D" stroke-width="0.5" opacity="0.28"/>
<text x="150" y="392" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#B8843D" letter-spacing="5" opacity="0.45">CLASSIQUE</text>
</svg>
