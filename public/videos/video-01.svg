<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
@keyframes b1anim{0%,100%{transform:rotate(-22deg)}50%{transform:rotate(-3deg)}}
@keyframes b2anim{0%,100%{transform:rotate(10deg)}50%{transform:rotate(-9deg)}}
@keyframes floatSc{0%,100%{transform:translateY(0px)}50%{transform:translateY(-9px)}}
@keyframes sfade{0%,38%{opacity:.85;transform:translateY(0)}62%,100%{opacity:0;transform:translateY(92px)}}
@keyframes glowPulse{0%,100%{opacity:.18}50%{opacity:.6}}
@keyframes rA{0%{opacity:0;transform:translate(0,0)}20%{opacity:.9}100%{opacity:0;transform:translate(-13px,-44px)}}
@keyframes rB{0%{opacity:0;transform:translate(0,0)}20%{opacity:.7}100%{opacity:0;transform:translate(11px,-38px)}}
@keyframes rC{0%{opacity:0;transform:translate(0,0)}20%{opacity:.9}100%{opacity:0;transform:translate(-7px,-52px)}}
@keyframes rD{0%{opacity:0;transform:translate(0,0)}20%{opacity:.8}100%{opacity:0;transform:translate(15px,-46px)}}
.b1{animation:b1anim 2.3s ease-in-out infinite;transform-origin:150px 208px}
.b2{animation:b2anim 2.3s ease-in-out infinite;transform-origin:150px 208px}
.sc{animation:floatSc 3.6s ease-in-out infinite}
.s1{animation:sfade 2.3s .0s ease-in infinite}
.s2{animation:sfade 2.3s .4s ease-in infinite}
.s3{animation:sfade 2.3s .8s ease-in infinite}
.s4{animation:sfade 2.3s 1.2s ease-in infinite}
.glow-el{animation:glowPulse 4.5s ease-in-out infinite}
.d1{animation:rA 2.3s .35s ease-out infinite}
.d2{animation:rB 2.3s .9s ease-out infinite}
.d3{animation:rC 2.3s 1.45s ease-out infinite}
.d4{animation:rD 2.3s 2.0s ease-out infinite}
</style>
<radialGradient id="bgG" cx="60%" cy="32%" r="65%">
  <stop offset="0%" stop-color="#B8843D" stop-opacity="0.15"/>
  <stop offset="100%" stop-color="#090909" stop-opacity="0"/>
</radialGradient>
<linearGradient id="blG" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#EFD9B1"/>
  <stop offset="100%" stop-color="#C8A850"/>
</linearGradient>
</defs>

<rect width="300" height="400" fill="#090909"/>
<rect width="300" height="400" fill="url(#bgG)"/>

<!-- Falling hair strands (cut and drop) -->
<g class="s1"><path d="M84,0 Q81,52 86,104" stroke="#2E1A08" stroke-width="3" fill="none" stroke-linecap="round"/></g>
<g class="s2"><path d="M115,0 Q118,47 112,97" stroke="#3A2210" stroke-width="2.5" fill="none" stroke-linecap="round"/></g>
<g class="s3"><path d="M185,0 Q182,50 187,100" stroke="#2E1A08" stroke-width="3" fill="none" stroke-linecap="round"/></g>
<g class="s4"><path d="M216,0 Q219,45 212,95" stroke="#3A2210" stroke-width="2.5" fill="none" stroke-linecap="round"/></g>

<!-- Scissors (float gently) -->
<g class="sc">
  <!-- Glow halo -->
  <ellipse class="glow-el" cx="150" cy="222" rx="62" ry="48" fill="none" stroke="#B8843D" stroke-width="0.5"/>

  <!-- Blade 1: pivot(150,208) → upper-left tip -->
  <g class="b1">
    <path d="M150,208 L71,106 Q69,102 73,99 Q77,97 79,101 L150,208" fill="url(#blG)" opacity="0.9"/>
    <line x1="150" y1="208" x2="114" y2="272" stroke="#B8843D" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="102" cy="288" rx="17" ry="12" fill="none" stroke="#B8843D" stroke-width="2.5" transform="rotate(-38,102,288)"/>
  </g>

  <!-- Blade 2: pivot(150,208) → upper-right tip -->
  <g class="b2">
    <path d="M150,208 L229,106 Q231,102 227,99 Q223,97 221,101 L150,208" fill="url(#blG)" opacity="0.9"/>
    <line x1="150" y1="208" x2="186" y2="272" stroke="#B8843D" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="198" cy="288" rx="17" ry="12" fill="none" stroke="#B8843D" stroke-width="2.5" transform="rotate(38,198,288)"/>
  </g>

  <!-- Pivot screw -->
  <circle cx="150" cy="208" r="7" fill="#EFD9B1"/>
  <circle cx="150" cy="208" r="3.5" fill="#B8843D"/>
</g>

<!-- Gold dust at cut point -->
<circle class="d1" cx="116" cy="107" r="2.5" fill="#B8843D" opacity="0"/>
<circle class="d2" cx="182" cy="105" r="2" fill="#EFD9B1" opacity="0"/>
<circle class="d3" cx="108" cy="99" r="1.8" fill="#B8843D" opacity="0"/>
<circle class="d4" cx="190" cy="115" r="2.2" fill="#C8A850" opacity="0"/>

<!-- Bottom label -->
<line x1="65" y1="376" x2="235" y2="376" stroke="#B8843D" stroke-width="0.5" opacity="0.28"/>
<text x="150" y="392" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#B8843D" letter-spacing="5" opacity="0.45">FINITIONS</text>
</svg>
