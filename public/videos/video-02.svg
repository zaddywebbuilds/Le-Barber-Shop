<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
@keyframes clipUp{0%,100%{transform:translateY(0px)}45%,55%{transform:translateY(-108px)}}
@keyframes glowPulse{0%,100%{opacity:.1}50%{opacity:.45}}
@keyframes sideFade{0%,100%{opacity:.75}50%{opacity:.25}}
@keyframes shimBlade{0%,100%{opacity:.18}50%{opacity:.68}}
@keyframes rA{0%{opacity:0;transform:translate(0,0)}20%{opacity:.9}100%{opacity:0;transform:translate(-11px,-42px)}}
@keyframes rB{0%{opacity:0;transform:translate(0,0)}20%{opacity:.7}100%{opacity:0;transform:translate(9px,-36px)}}
@keyframes rC{0%{opacity:0;transform:translate(0,0)}20%{opacity:.85}100%{opacity:0;transform:translate(-5px,-50px)}}
.clipper-grp{animation:clipUp 3s ease-in-out infinite}
.glow-el{animation:glowPulse 3s ease-in-out infinite}
.fade-side{animation:sideFade 3s ease-in-out infinite}
.blade-shim{animation:shimBlade 1.3s linear infinite}
.d1{animation:rA 3s .4s ease-out infinite}
.d2{animation:rB 3s 1.1s ease-out infinite}
.d3{animation:rC 3s 1.8s ease-out infinite}
</style>
<radialGradient id="bgG" cx="42%" cy="33%" r="65%">
  <stop offset="0%" stop-color="#B8843D" stop-opacity="0.13"/>
  <stop offset="100%" stop-color="#090909" stop-opacity="0"/>
</radialGradient>
<linearGradient id="sideG" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#090909" stop-opacity="0.88"/>
  <stop offset="100%" stop-color="#090909" stop-opacity="0"/>
</linearGradient>
<linearGradient id="hairG" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#2A1C0E"/>
  <stop offset="100%" stop-color="#1A1208" stop-opacity="0.35"/>
</linearGradient>
<linearGradient id="clipG" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#C8A850"/>
  <stop offset="100%" stop-color="#A07830"/>
</linearGradient>
</defs>

<rect width="300" height="400" fill="#090909"/>
<rect width="300" height="400" fill="url(#bgG)"/>

<!-- Neck -->
<rect x="128" y="245" width="44" height="72" rx="11" fill="#1A1410"/>
<!-- Shoulders -->
<ellipse cx="150" cy="340" rx="108" ry="54" fill="#151210"/>

<!-- Head -->
<ellipse cx="150" cy="153" rx="76" ry="91" fill="#1E1610"/>

<!-- Hair mass on top -->
<path d="M74,118 Q77,60 150,56 Q223,60 226,118 Q200,83 150,80 Q100,83 74,118Z" fill="url(#hairG)"/>

<!-- Ear -->
<ellipse cx="75" cy="162" rx="9" ry="13" fill="#1A1410"/>

<!-- Subtle face features -->
<ellipse cx="134" cy="156" rx="7" ry="5" fill="#0D0B09" opacity="0.22"/>
<ellipse cx="168" cy="156" rx="7" ry="5" fill="#0D0B09" opacity="0.22"/>
<path d="M133,184 Q150,194 167,184" stroke="#0D0B09" stroke-width="1.5" fill="none" opacity="0.18"/>

<!-- Fade overlay — left side darkens (barber's fade) -->
<ellipse class="fade-side" cx="112" cy="172" rx="50" ry="74" fill="url(#sideG)"/>

<!-- Clipper group: starts at side bottom, moves up -->
<g class="clipper-grp">
  <!-- Clipper body -->
  <rect x="34" y="250" width="54" height="23" rx="5" fill="url(#clipG)"/>
  <!-- Blade bar -->
  <rect x="30" y="246" width="58" height="8" rx="3" fill="#EFD9B1"/>
  <!-- Blade teeth -->
  <g stroke="#B8843D" stroke-width="1.1" stroke-linecap="round">
    <line x1="33" y1="246" x2="33" y2="240"/>
    <line x1="36.5" y1="246" x2="36.5" y2="240"/>
    <line x1="40" y1="246" x2="40" y2="240"/>
    <line x1="43.5" y1="246" x2="43.5" y2="240"/>
    <line x1="47" y1="246" x2="47" y2="240"/>
    <line x1="50.5" y1="246" x2="50.5" y2="240"/>
    <line x1="54" y1="246" x2="54" y2="240"/>
    <line x1="57.5" y1="246" x2="57.5" y2="240"/>
    <line x1="61" y1="246" x2="61" y2="240"/>
    <line x1="64.5" y1="246" x2="64.5" y2="240"/>
    <line x1="68" y1="246" x2="68" y2="240"/>
    <line x1="71.5" y1="246" x2="71.5" y2="240"/>
    <line x1="75" y1="246" x2="75" y2="240"/>
    <line x1="78.5" y1="246" x2="78.5" y2="240"/>
    <line x1="82" y1="246" x2="82" y2="240"/>
  </g>
  <!-- Blade shimmer -->
  <rect class="blade-shim" x="30" y="243" width="58" height="3" rx="1" fill="white" opacity="0.42"/>
  <!-- Cord trailing below -->
  <path d="M88,261 Q112,278 110,298 Q108,318 124,328" stroke="#B8843D" stroke-width="1.8" fill="none" stroke-dasharray="4,3" opacity="0.38"/>

  <!-- Glow at blade tip -->
  <ellipse class="glow-el" cx="61" cy="244" rx="22" ry="7" fill="#B8843D" opacity="0.2"/>

  <!-- Hair dust (moves with clipper) -->
  <circle class="d1" cx="55" cy="242" r="2" fill="#B8843D" opacity="0"/>
  <circle class="d2" cx="68" cy="240" r="1.5" fill="#EFD9B1" opacity="0"/>
  <circle class="d3" cx="46" cy="244" r="1.8" fill="#C8A850" opacity="0"/>
</g>

<!-- Bottom label -->
<line x1="65" y1="376" x2="235" y2="376" stroke="#B8843D" stroke-width="0.5" opacity="0.28"/>
<text x="150" y="392" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#B8843D" letter-spacing="5" opacity="0.45">DÉGRADÉ</text>
</svg>
